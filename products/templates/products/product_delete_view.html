{% extends 'partial/base.html' %}

{% block title %}Удалить товар{% endblock %}

{% block content %}
<div class="card my-5">
    <div class="card-header fs-4 text-center py-3">Удалить запись</div>
    <div class="card-body">
        <p>Вы точно хотите удалить товар <strong>{{ product.name }}</strong> ?</p>
                <div class="col-4">
                    <img src="{{ product.image }}" class="img-fluid rounded w-100" style="height: 200px; object-fit: contain;" alt="{{ product.name }}">
                </div>
        <p></p>
        <form method="POST" action="">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{% url 'product_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
