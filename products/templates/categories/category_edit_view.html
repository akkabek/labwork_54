{% extends 'partial/base.html' %}

{% block content %}

<div class="row">
    <div class="col-md-4">
        <h2 class="mb-4">Edit Category</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <input
                    type="text"
                    class="form-control"
                    name="name"
                    value="{{ category.name }}"
                    required>
            </div>
            <div class="mb-3">
                <textarea
                    class="form-control"
                    name="description"
                    rows="5"
                    required>{{ category.description }}</textarea>
            </div>
            <button
                type="submit"
                class="btn btn-primary">
                Edit Category
            </button>
        </form>
    </div>
</div>
{% endblock %}
