<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <nav class="navbar navbar-light bg-light px-4">
        <a href="{% url 'products' %}" class="navbar-brand fw-bold me-auto">My market</a>

        <form method="GET" action="{% url 'product_list' %}" class="d-flex mx-auto">
            <input type="text" name="q" class="form-control w-auto"
                   placeholder="Поиск по товару"
                   value="{{ request.GET.q }}">
            <button type="submit" class="btn btn-outline-primary ms-1">Найти</button>
        </form>
        <span class="mx-6">|</span>

        <a href="{% url 'products' %}">Products</a>
        <span class="mx-2">|</span>

        <a href="{% url 'categories_view' %}">Categories</a>
        <span class="mx-2">|</span>

        <a href="{% url 'product_add' %}">Add product</a>
        <span class="mx-2">|</span>

        <a href="{% url 'category_add' %}">Add category</a>
    </nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="https://kit.fontawesome.com/YOUR_KIT_CODE.js" crossorigin="anonymous"></script>

</body>
</html>
