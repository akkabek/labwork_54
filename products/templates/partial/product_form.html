{% csrf_token %}

{% for error in form.non_field_errors %}
    <div class="alert alert-danger">{{ error }}</div>
{% endfor %}

{% for field in form %}
    <div class="mb-3">
        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
        {% for error in field.errors %}
            <div class="text-danger small">{{ error }}</div>
        {% endfor %}
        {{ field }}
    </div>
{% endfor %}
