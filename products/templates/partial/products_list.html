{% for product in products %}
<div class="col-6 mb-3">
    <div class="card">
        <div class="row g-0">
            <div class="col-4">
                <img src="{{ product.image }}" class="img-fluid rounded w-100"
                     style="height: 200px; object-fit: contain;" alt="{{ product.name }}">
            </div>
            <div class="col-6">
                <div class="card-body">
                    <h5 class="card-title">{{ product.name }}</h5>
                    <a href="{% url 'category_products' product.category.slug %}">
                        {{ product.category }}
                    </a>
                    <p><strong>Price: {{ product.price }} KGS</strong></p>
                    <a href="{% url 'product_view' product.id %}">see more</a>
                </div>
            </div>
            <div class="col-2 mt-3">
                <a href="{% url 'product_edit' product.pk %}" class="btn btn-sm btn-outline-warning">
                    <i class="fa-regular fa-pen-to-square"></i>
                </a>
                <a href="{% url 'product_delete' product.pk %}" class="btn btn-sm btn-outline-danger">
                    <i class="fa-regular fa-trash-can"></i>
                </a>
            </div>
        </div>
    </div>
</div>
{% empty %}
    <p>No items yet <a href="{% url 'product_add' %}">Do you want to add an item?</a></p>
{% endfor %}
