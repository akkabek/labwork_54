<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My market</title>
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-light bg-light px-4">
        <span class="navbar-brand fw-bold me-auto">My market</span>

        <form method="GET" action="" class="d-flex mx-auto">

            <input type="text" name="query" class="form-control w-auto"
                   placeholder="Поиск по товару"
                   value="{{ request.GET.query }}">
            <button type="submit" class="btn btn-outline-primary">Найти</button>
        </form>
        <span class="mx-6">|</span>

        <a href="{% url 'products' %}">Products</a>
        <span class="mx-2">|</span>

        <a href="{% url 'categories_view' %}">Categories</a>
        <span class="mx-2">|</span>

        <a href="{% url 'product_add' %}">Add product</a>
        <span class="mx-2">|</span>

        <a href="{% url 'category_add' %}">Add category</a>
    </nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
