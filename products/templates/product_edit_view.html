{% extends 'base.html' %}

{% block content %}

<div class="row">
    <div class="col-md-5">

        <h2 class="mb-4">
            Edit Product
        </h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <input
                    type="text"
                    class="form-control"
                    name="name"
                    value="{{ product.name }}"
                    required>
            </div>

            <div class="mb-3">
                <input
                    type="number"
                    step="0.01"
                    class="form-control"
                    name="price"
                    value="{{ product.price }}"
                    required>
            </div>

            <div class="mb-3">
                <input
                    type="url"
                    class="form-control"
                    name="image"
                    value="{{ product.image }}"
                    required>
            </div>

            <div class="mb-3">
                <select
                    class="form-select"
                    name="category">

                    {% for category in categories %}
                        <option
                            value="{{ category.id }}"
                            {% if category.id == product.category.id %}
                                selected
                            {% endif %}
                        >
                            {{ category.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <textarea
                    class="form-control"
                    name="description"
                    rows="4">{{ product.description }}</textarea>
            </div>

            <button
                type="submit"
                class="btn btn-primary">
                Edit Product
            </button>

        </form>

    </div>
</div>

{% endblock %}
