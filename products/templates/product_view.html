{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="row g-0">
        <div class="col-4">
            <img src="{{ product.image }}" class="img-fluid rounded" alt="{{ product.name }}">
        </div>
        <div class="col-8">
            <div class="card-body">
                <h3 class="card-title">{{ product.name }}</h3>
                <p class="text-muted">{{ product.category }}</p>
                <p><strong>Price: {{ product.price }}$</strong></p>
                <p>{{ product.description }}</p>
                <p class="text-muted small">added: {{ product.created_at }}</p>
            </div>
        </div>
    </div>
</div>

<a href="{% url 'products' %}" class="btn btn-secondary mt-3">Back to list</a>

<div class="mt-3">
    <a href="{% url 'product_edit' product.id %}"
       class="btn btn-primary btn-sm">
        Edit
    </a>

    <form method="GET"
          action="{% url 'product_delete' product.id %}"
          class="d-inline">
        {% csrf_token %}
        <button type="submit"
                class="btn btn-danger btn-sm">
            Delete
        </button>
    </form>
</div>
{% endblock %}
